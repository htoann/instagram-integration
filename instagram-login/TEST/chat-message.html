<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Chat Tester</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 20px;
        max-width: 860px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input,
      select,
      button,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-top: 6px;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }
      #chatBox {
        margin-top: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        min-height: 260px;
        max-height: 420px;
        overflow: auto;
        background: #fafafa;
      }
      .msg {
        margin: 0 0 8px;
        padding: 8px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #eee;
      }
      .me {
        background: #e8f4ff;
        border-color: #d4e8ff;
      }
      .meta {
        color: #666;
        font-size: 12px;
        margin-top: 4px;
      }
      #status {
        margin-top: 12px;
        white-space: pre-wrap;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>Instagram Realtime Chat Tester</h2>

    <button id="loginBtn" type="button">Login with Instagram</button>

    <div id="chatSection" class="hidden">
      <label for="conversationSelect">Conversation</label>
      <div class="row">
        <select id="conversationSelect"></select>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>

      <div id="chatBox">No messages yet.</div>

      <label for="messageInput">Message</label>
      <textarea id="messageInput" placeholder="Type message..."></textarea>
      <button id="sendBtn" type="button">Send Message</button>
    </div>

    <pre id="status">Ready.</pre>

    <script>
      const CONFIG = {
        loginEndpoint: "https://localhost:3000/message/login",
        conversationsEndpoint: "https://localhost:3000/message/conversations",
        messagesEndpoint: (conversationId) =>
          `https://localhost:3000/message/messages/${encodeURIComponent(conversationId)}?limit=50`,
        streamEndpoint: "https://localhost:3000/message/stream",
        sendEndpoint: "https://localhost:3000/message/send",
        tokenKey: "instagramAccessToken",
      };

      const trustedOrigin = new URL(CONFIG.loginEndpoint).origin;
      let pendingLogin = null;
      let stream = null;
      let streamReconnectTimer = null;
      let refreshInFlight = false;
      let selectedConversation = null;
      let selectedRecipientId = null;
      let myUserId = null;
      let myUsername = null;
      let myParticipantId = null;

      const $ = (id) => document.getElementById(id);
      const ui = {
        loginBtn: $("loginBtn"),
        chatSection: $("chatSection"),
        conversationSelect: $("conversationSelect"),
        refreshBtn: $("refreshBtn"),
        chatBox: $("chatBox"),
        messageInput: $("messageInput"),
        sendBtn: $("sendBtn"),
        status: $("status"),
      };

      const setStatus = (text) => (ui.status.textContent = text);
      const getToken = () => localStorage.getItem(CONFIG.tokenKey);
      const setToken = (token) => localStorage.setItem(CONFIG.tokenKey, token);
      const clearToken = () => localStorage.removeItem(CONFIG.tokenKey);
      const toMessage = (error) => error?.message || error || "Unknown error";
      const tokenExpired = (error) =>
        error?.status === 401 || error?.payload?.code === "TOKEN_EXPIRED";
      const resetSession = (message) => {
        clearToken();
        renderAuthState();
        stopStream();
        setStatus(message);
      };
      const parseJson = (text) => {
        try {
          return JSON.parse(text);
        } catch {
          return text;
        }
      };

      const normalizeId = (value) => String(value ?? "").trim();
      const normalizeUsername = (value) =>
        String(value ?? "")
          .trim()
          .toLowerCase();
      const resolveMyParticipantIdFromParticipants = (participants) => {
        const myName = normalizeUsername(myUsername);
        if (myParticipantId || !myName) return;

        myParticipantId =
          normalizeId(
            (participants || []).find(
              (participant) =>
                normalizeUsername(participant?.username) === myName,
            )?.id,
          ) || null;
      };
      const isMe = (userLike) => {
        const candidateId = normalizeId(userLike?.id);
        const candidateName = normalizeUsername(userLike?.username);

        return (
          [normalizeId(myParticipantId), normalizeId(myUserId)].some(
            (id) => id && candidateId && id === candidateId,
          ) ||
          (normalizeUsername(myUsername) &&
            candidateName &&
            normalizeUsername(myUsername) === candidateName)
        );
      };

      const completePendingLogin = (handler) => {
        if (!pendingLogin) return;
        const current = pendingLogin;
        pendingLogin = null;
        clearInterval(current.closeTimer);
        handler(current);
      };

      const renderAuthState = () => {
        const loggedIn = Boolean(getToken());
        ui.loginBtn.classList.toggle("hidden", loggedIn);
        ui.chatSection.classList.toggle("hidden", !loggedIn);
      };

      const syncSelection = () => {
        selectedConversation = ui.conversationSelect.value || null;
        selectedRecipientId =
          ui.conversationSelect.selectedOptions[0]?.dataset?.recipientId ||
          null;
      };

      const openLoginPopup = () =>
        new Promise((resolve, reject) => {
          const popup = window.open(
            CONFIG.loginEndpoint,
            "instagramMessageLoginPopup",
            "width=520,height=720",
          );

          if (!popup) {
            reject(
              new Error("Popup blocked. Please allow popups and try again."),
            );
            return;
          }

          const closeTimer = setInterval(() => {
            if (!popup.closed) return;
            completePendingLogin(({ reject: rejectLogin }) =>
              rejectLogin(
                new Error(
                  "Login popup was closed before authentication completed.",
                ),
              ),
            );
          }, 400);

          pendingLogin = { resolve, reject, closeTimer };
        });

      const apiFetch = async (url, options = {}) => {
        const token = getToken();
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };

        if (token) headers.Authorization = `Bearer ${token}`;

        const res = await fetch(url, { ...options, headers });
        const raw = await res.text();
        const data = parseJson(raw);

        if (!res.ok) {
          const error = new Error(
            data?.error?.message || data?.error || res.statusText,
          );
          error.status = res.status;
          error.payload = data;
          throw error;
        }

        return data;
      };

      const normalizeMessages = (messages) =>
        [...messages]
          .filter((item) => item && typeof item === "object")
          .sort(
            (a, b) =>
              new Date(a.created_time || 0) - new Date(b.created_time || 0),
          );

      const renderMessages = (messages) => {
        if (!messages.length) {
          ui.chatBox.textContent = "No messages yet.";
          return;
        }

        ui.chatBox.innerHTML = "";
        const fragment = document.createDocumentFragment();

        messages.forEach((msg) => {
          const fromId = msg?.from?.id || "unknown";
          const fromName = msg?.from?.username || fromId;
          const text = msg?.message || "(empty)";
          const ts = msg?.created_time
            ? new Date(msg.created_time).toLocaleString()
            : "";
          const item = document.createElement("div");
          item.className = "msg" + (isMe(msg?.from) ? " me" : "");
          item.innerHTML = `<div>${escapeHtml(text)}</div><div class="meta">${escapeHtml(fromName)} ${ts ? "• " + escapeHtml(ts) : ""}</div>`;
          fragment.appendChild(item);
        });

        ui.chatBox.appendChild(fragment);
        ui.chatBox.scrollTop = ui.chatBox.scrollHeight;
      };

      const escapeHtml = (text) =>
        String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");

      const getRecipientFromConversation = (conversation) => {
        const participants = conversation?.participants?.data || [];
        resolveMyParticipantIdFromParticipants(participants);
        return participants.find((p) => !isMe(p)) || null;
      };

      const loadConversations = async () => {
        const data = await apiFetch(CONFIG.conversationsEndpoint);
        myUserId = data.userId || null;
        myUsername = data.username || myUsername || null;
        myParticipantId = null;
        const conversations = data.conversations || [];

        ui.conversationSelect.innerHTML = "";
        if (!conversations.length) {
          selectedConversation = null;
          selectedRecipientId = null;
          ui.chatBox.textContent =
            "No conversations found. Ask someone to message your IG account first.";
          return;
        }

        conversations.forEach((conversation, index) => {
          const recipient = getRecipientFromConversation(conversation);
          const option = document.createElement("option");
          option.value = conversation.id;
          option.textContent = recipient
            ? `${recipient.username || recipient.id} (${conversation.id})`
            : `Conversation ${index + 1} (${conversation.id})`;
          option.dataset.recipientId = recipient?.id || "";
          ui.conversationSelect.appendChild(option);
        });

        syncSelection();
      };

      const loadMessages = async () => {
        if (!selectedConversation) return;
        const data = await apiFetch(
          CONFIG.messagesEndpoint(selectedConversation),
        );
        const messages = normalizeMessages(data.messages || []);

        if (!myParticipantId) {
          const myName = normalizeUsername(myUsername);
          if (myName) {
            const mine = messages.find(
              (msg) => normalizeUsername(msg?.from?.username) === myName,
            );
            if (mine?.from?.id) myParticipantId = normalizeId(mine.from.id);
          }
        }

        renderMessages(messages);
      };

      const refreshAll = async () => {
        await loadConversations();
        await loadMessages();
      };

      const refreshAllSafe = async (statusMessageOnError) => {
        if (refreshInFlight) return;
        refreshInFlight = true;
        try {
          await refreshAll();
        } catch (error) {
          if (statusMessageOnError) {
            setStatus(statusMessageOnError + toMessage(error));
          }
        } finally {
          refreshInFlight = false;
        }
      };

      const stopStream = () => {
        if (streamReconnectTimer) {
          clearTimeout(streamReconnectTimer);
          streamReconnectTimer = null;
        }
        if (!stream) return;
        stream.close();
        stream = null;
      };

      const startStream = () => {
        stopStream();

        const token = getToken();
        if (!token) return;

        const url = `${CONFIG.streamEndpoint}?accessToken=${encodeURIComponent(token)}`;
        stream = new EventSource(url);

        stream.onmessage = async (event) => {
          try {
            const payload = parseJson(event.data);
            if (!payload || payload.type === "connected") return;
            await refreshAllSafe("Realtime update failed: ");
          } catch (error) {
            setStatus("Realtime update failed: " + toMessage(error));
          }
        };

        stream.onerror = () => {
          if (!getToken()) return;
          stopStream();
          streamReconnectTimer = setTimeout(startStream, 1500);
        };
      };

      const connectRealtime = async (loadingMessage) => {
        if (loadingMessage) setStatus(loadingMessage);
        await refreshAllSafe();
        startStream();
        setStatus("Realtime stream connected.");
      };

      window.addEventListener("message", (event) => {
        if (event.origin !== trustedOrigin) return;
        const { type, accessToken, error, username, userId } = event.data || {};

        if (type === "instagram_oauth_success" && accessToken) {
          myUsername = username || myUsername || null;
          myUserId = userId || myUserId || null;
          setToken(accessToken);
          renderAuthState();
          completePendingLogin(({ resolve }) => resolve(accessToken));
          return;
        }

        if (type === "instagram_oauth_error") {
          const message = toMessage(error);
          setStatus("Login failed: " + message);
          completePendingLogin(({ reject }) => reject(new Error(message)));
        }
      });

      ui.loginBtn.addEventListener("click", async () => {
        try {
          await openLoginPopup();
          await connectRealtime("Login successful. Loading conversations...");
        } catch (error) {
          setStatus("Login failed: " + toMessage(error));
        }
      });

      ui.conversationSelect.addEventListener("change", async () => {
        syncSelection();
        try {
          await loadMessages();
        } catch (error) {
          setStatus("Load messages failed: " + toMessage(error));
        }
      });

      ui.refreshBtn.addEventListener("click", async () => {
        try {
          setStatus("Refreshing conversations and messages...");
          await refreshAll();
          setStatus("Refresh done.");
        } catch (error) {
          setStatus("Refresh failed: " + toMessage(error));
        }
      });

      ui.sendBtn.addEventListener("click", async () => {
        const message = ui.messageInput.value.trim();
        if (!selectedConversation)
          return setStatus("No conversation selected.");
        if (!message) return setStatus("Message is required.");

        try {
          await apiFetch(CONFIG.sendEndpoint, {
            method: "POST",
            body: JSON.stringify({
              recipientId: selectedRecipientId,
              conversationId: selectedConversation,
              message,
            }),
          });

          ui.messageInput.value = "";
          await loadMessages();
          setStatus("Message sent.");
        } catch (error) {
          if (tokenExpired(error))
            return resetSession("Token expired. Please login again.");
          setStatus("Send failed: " + toMessage(error));
        }
      });

      (async () => {
        renderAuthState();
        if (!getToken()) return;

        try {
          await connectRealtime();
        } catch (error) {
          resetSession("Session invalid. Please login again.");
        }
      })();

      window.addEventListener("beforeunload", stopStream);
    </script>
  </body>
</html>
